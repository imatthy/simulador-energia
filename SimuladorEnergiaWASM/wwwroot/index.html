<body>

    <script>
        window.renderizarLatex = (elemento) => {
            if (window.renderMathInElement) {
                window.renderMathInElement(elemento, {
                    delimiters: [
                        { left: "$$", right: "$$", display: true }, // Para equações em bloco
                        { left: "$", right: "$", display: false }   // Para equações na mesma linha
                    ],
                    throwOnError: false // Se o usuário digitar algo errado, ele não quebra a tela
                });
            }
        };
    </script>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="/" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
